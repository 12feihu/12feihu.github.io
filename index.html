<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Horrible Cards</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text-dim: #888;
  --accent: #ff2d6f;
  --accent-glow: rgba(255, 45, 111, 0.3);
  --black-card: #111;
  --white-card: #f0ece4;
  --white-card-text: #1a1a1a;
  --green: #00e676;
  --gold: #ffd740;
  --radius: 12px;
  --radius-lg: 18px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

h1, h2, h3, .label { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

.screen { display: none; min-height: 100dvh; padding: 20px; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

/* ── MENU SCREEN ── */
#menu { justify-content: center; gap: 30px; text-align: center; }
#menu .logo { font-family: 'Oswald', sans-serif; font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 700; letter-spacing: 3px; line-height: 1.1; }
#menu .logo span { color: var(--accent); }
#menu .subtitle { color: var(--text-dim); font-size: 0.95rem; letter-spacing: 2px; margin-top: -10px; }

.btn {
  font-family: 'Oswald', sans-serif;
  font-size: 1.1rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 14px 36px;
  border: 2px solid var(--accent);
  background: transparent;
  color: var(--accent);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.btn:hover { background: var(--accent); color: #fff; box-shadow: 0 0 30px var(--accent-glow); }
.btn.solid { background: var(--accent); color: #fff; }
.btn.solid:hover { background: #e6225f; }
.btn.small { font-size: 0.85rem; padding: 8px 20px; }
.btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }

.input {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1rem;
  padding: 12px 16px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.input:focus { border-color: var(--accent); }
.input::placeholder { color: var(--text-dim); }

.menu-buttons { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }

/* ── JOIN/CREATE ── */
#setup { justify-content: center; gap: 20px; text-align: center; max-width: 420px; margin: 0 auto; }
#setup h2 { font-size: 1.8rem; }
.form-group { width: 100%; text-align: left; }
.form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 1px; }

.room-code-display {
  font-family: 'Oswald', sans-serif;
  font-size: 3rem;
  letter-spacing: 12px;
  color: var(--accent);
  background: var(--surface);
  padding: 16px 30px;
  border-radius: var(--radius);
  border: 2px solid var(--accent);
  text-align: center;
  user-select: all;
}

/* ── LOBBY ── */
#lobby { justify-content: center; gap: 24px; text-align: center; max-width: 500px; margin: 0 auto; }
.player-list {
  display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; width: 100%;
}
.player-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 8px 18px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.95rem;
  display: flex; align-items: center; gap: 8px;
}
.player-chip .crown { color: var(--gold); }
.player-chip.me { border-color: var(--accent); }

.status-text { color: var(--text-dim); font-size: 0.9rem; }

.lobby-deck-info {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  width: 100%;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-dim);
}
.lobby-deck-info strong { color: var(--text); }
.lobby-deck-info .deck-names {
  color: var(--gold);
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 2px;
}

/* ── GAME SCREEN ── */
#game { padding: 12px; gap: 12px; }

.game-header {
  width: 100%;
  max-width: 800px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: var(--surface);
  border-radius: var(--radius);
  font-size: 0.85rem;
}
.game-header .round-info { color: var(--text-dim); }
.game-header .room-code-header {
  font-family: 'Oswald', sans-serif;
  letter-spacing: 4px;
  color: var(--accent);
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.game-header .room-code-header:hover { opacity: 1; }
.game-header .czar-info { color: var(--gold); font-weight: 700; }

.black-card {
  background: #000;
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 24px 22px 40px;
  font-family: 'Oswald', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  font-weight: 700;
  line-height: 1.35;
  width: 100%;
  max-width: 500px;
  min-height: 160px;
  position: relative;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}
.black-card::after {
  content: '';
  position: absolute;
  bottom: 38px;
  left: 18px;
  right: 18px;
  height: 1px;
  background: rgba(255,255,255,0.25);
}
.black-card .card-label {
  position: absolute;
  bottom: 12px;
  left: 22px;
  font-size: 0.6rem;
  color: rgba(255,255,255,0.45);
  letter-spacing: 1.5px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.black-card .card-label::before {
  content: '';
  display: inline-block;
  width: 12px;
  height: 14px;
  border: 1.5px solid rgba(255,255,255,0.45);
  border-radius: 2px;
  position: relative;
  box-shadow: 2px -2px 0 -0.5px #000, 2px -2px 0 0.5px rgba(255,255,255,0.35);
}
.black-card .pick-badge {
  position: absolute;
  top: 14px;
  right: 16px;
  background: var(--accent);
  color: #fff;
  font-family: 'Oswald', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
}

.hand-card .pick-number {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--accent);
  color: #fff;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  box-shadow: 0 2px 8px var(--accent-glow);
}

.sub-card.multi-part {
  width: auto;
  min-width: 180px;
  max-width: 280px;
}
.sub-card .part-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sub-card .part-item {
  background: rgba(0,0,0,0.04);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 0.85rem;
  position: relative;
}
.sub-card .part-item .part-num {
  font-family: 'Oswald', sans-serif;
  color: var(--accent);
  font-size: 0.7rem;
  letter-spacing: 1px;
  margin-bottom: 2px;
}
.sub-card .part-item img {
  max-width: 100%;
  max-height: 100px;
  border-radius: 4px;
  object-fit: contain;
}

.phase-label {
  font-family: 'Oswald', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ── SUBMISSIONS AREA ── */
.submissions-area {
  width: 100%;
  max-width: 800px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.submitted-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  width: 100%;
}

.sub-card {
  background: #fff;
  color: #000;
  border-radius: 12px;
  padding: 16px 14px 36px;
  width: 180px;
  min-height: 160px;
  font-family: 'Oswald', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  line-height: 1.3;
  cursor: default;
  position: relative;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  word-break: break-word;
}
.sub-card::after {
  content: '';
  display: inline-block;
  position: absolute;
  bottom: 10px;
  left: 14px;
  width: 10px;
  height: 12px;
  border: 1.5px solid rgba(0,0,0,0.2);
  border-radius: 1.5px;
  box-shadow: 2px -2px 0 -0.5px #fff, 2px -2px 0 0.5px rgba(0,0,0,0.15);
}
.sub-card img {
  max-width: 100%;
  max-height: 140px;
  border-radius: 6px;
  object-fit: contain;
}
.sub-card.pickable { cursor: pointer; }
.sub-card.pickable:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 8px 30px rgba(255,45,111,0.3); }
.sub-card.winner { border: 3px solid var(--gold); box-shadow: 0 0 30px rgba(255,215,64,0.4); }
.sub-card.facedown {
  background: var(--surface2);
  color: var(--text-dim);
  border: 2px dashed var(--border);
  font-style: italic;
  text-align: center;
  font-size: 0.85rem;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 400;
  justify-content: center;
}
.sub-card.facedown::after { display: none; }

.sub-card .player-tag {
  font-size: 0.7rem;
  color: #999;
  margin-top: 8px;
  font-weight: 400;
}

/* ── HAND ── */
.hand-area {
  width: 100%;
  max-width: 800px;
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.hand-label { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 8px; text-align: center; }

.hand-cards {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 6px 2px 12px;
  scroll-snap-type: x mandatory;
}
.hand-cards::-webkit-scrollbar { height: 4px; }
.hand-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.hand-card {
  flex-shrink: 0;
  background: #fff;
  color: #000;
  border-radius: 10px;
  padding: 12px 10px 30px;
  width: 140px;
  min-height: 120px;
  font-family: 'Oswald', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  line-height: 1.25;
  cursor: pointer;
  scroll-snap-align: start;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 2px solid transparent;
  position: relative;
}
.hand-card::after {
  content: '';
  display: inline-block;
  position: absolute;
  bottom: 8px;
  left: 10px;
  width: 8px;
  height: 10px;
  border: 1.2px solid rgba(0,0,0,0.15);
  border-radius: 1px;
  box-shadow: 1.5px -1.5px 0 -0.5px #fff, 1.5px -1.5px 0 0.3px rgba(0,0,0,0.12);
}
.hand-card:hover { transform: translateY(-8px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
.hand-card.selected { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 4px 20px var(--accent-glow); }
.hand-card img {
  max-width: 100%;
  max-height: 80px;
  border-radius: 4px;
  object-fit: contain;
  display: block;
}
.hand-card.image-card {
  padding: 8px 8px 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.black-card img.black-card-img {
  max-width: 100%;
  max-height: 200px;
  border-radius: 8px;
  object-fit: contain;
}

.custom-input-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.custom-input-row .input { flex: 1; min-width: 0; }
.custom-img-btns { display: flex; gap: 6px; flex-shrink: 0; }

/* ── URL IMAGE PREVIEW ── */
.url-preview-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 85;
  padding: 20px;
  text-align: center;
}
.url-preview-overlay.active { display: flex; }
.url-preview-overlay .preview-status {
  font-size: 0.9rem;
  color: var(--text-dim);
  min-height: 1.2em;
}
.url-preview-overlay .preview-status.error { color: #f88; }
.url-preview-overlay .preview-status.success { color: var(--green); }
.url-preview-overlay .url-preview-img {
  max-width: min(90vw, 500px);
  max-height: 45vh;
  border-radius: var(--radius);
  object-fit: contain;
  background: var(--white-card);
  padding: 8px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  display: none;
}
.url-preview-overlay .url-preview-img.loaded { display: block; }
.url-preview-overlay .url-input-row {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 500px;
}
.url-preview-overlay .url-input-row .input { flex: 1; }
.url-preview-overlay .preview-btns { display: flex; gap: 12px; }

/* ── CZAR CONFIRM ── */
.img-url-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--accent);
  font-size: 0.8rem;
  text-decoration: none;
  padding: 4px 0;
  word-break: break-all;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.img-url-link:hover { text-decoration: underline; }
.sub-card .img-url-link {
  display: block;
  font-size: 0.7rem;
  margin-top: 6px;
  color: #888;
}
.sub-card .img-url-link:hover { color: var(--accent); }
.preview-link-row {
  max-width: min(90vw, 500px);
  text-align: center;
}
.preview-link-row .img-url-link {
  font-size: 0.85rem;
  display: inline-flex;
  justify-content: center;
}
.confirm-link-row { text-align: center; margin-top: 4px; }
.confirm-link-row .img-url-link { font-size: 0.75rem; color: #999; }

.czar-confirm-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 90;
  padding: 20px;
  text-align: center;
}
.czar-confirm-overlay.active { display: flex; }
.czar-confirm-overlay h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.3rem;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.czar-confirm-overlay .confirm-btns { display: flex; gap: 12px; }

/* ── IMAGE PREVIEW ── */
.image-preview-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 85;
  padding: 20px;
  text-align: center;
}
.image-preview-overlay.active { display: flex; }
.image-preview-overlay .preview-prompt {
  background: var(--black-card);
  color: #fff;
  border: 2px solid #333;
  border-radius: var(--radius);
  padding: 16px 20px;
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.3;
  max-width: 500px;
  width: 100%;
}
.image-preview-overlay .preview-img {
  max-width: min(90vw, 600px);
  max-height: 50vh;
  border-radius: var(--radius);
  object-fit: contain;
  background: var(--white-card);
  padding: 8px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.image-preview-overlay .preview-btns { display: flex; gap: 12px; }

/* ── RESULTS ── */
.results-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 100;
  padding: 20px;
  text-align: center;
}
.results-overlay.active { display: flex; }
.results-overlay h2 { font-size: 1.8rem; color: var(--gold); }
.results-overlay .winner-name { font-size: 1.3rem; color: var(--accent); font-weight: 700; }

/* ── SCOREBOARD ── */
.scoreboard {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
}
.score-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 4px;
  border-bottom: 1px solid var(--border);
}
.score-row:last-child { border-bottom: none; }
.score-row .name { font-weight: 600; }
.score-row .score { color: var(--gold); font-family: 'Oswald', sans-serif; font-size: 1.3rem; }

/* ── TOAST ── */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: 0.9rem;
  animation: slideIn 0.3s ease;
  max-width: 300px;
}
.toast.error { border-color: #f44; color: #f88; }
.toast.success { border-color: var(--green); color: var(--green); }

@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── CZAR BANNER ── */
.czar-banner {
  position: fixed;
  inset: 0;
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px 20px;
  pointer-events: none;
  opacity: 0;
  background: rgba(0,0,0,0.85);
}
.czar-banner.active {
  animation: czarBannerIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards,
             czarBannerOut 0.8s ease-in 2.2s forwards;
}
.czar-banner-inner {
  background: linear-gradient(135deg, rgba(255,215,64,0.12), rgba(255,45,111,0.08));
  border: 2px solid var(--gold);
  border-radius: var(--radius-lg);
  padding: 24px 48px;
  text-align: center;
  box-shadow: 0 0 60px rgba(255,215,64,0.25), 0 0 120px rgba(255,215,64,0.1);
  transform: scale(0.8);
  opacity: 0;
}
.czar-banner.active .czar-banner-inner {
  animation: czarCardPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
}
.czar-banner-inner .crown-icon {
  font-size: 2.2rem;
  display: block;
  margin-bottom: 4px;
}
.czar-banner.active .crown-icon {
  animation: crownBounce 0.5s ease 0.3s both;
}
.czar-banner-inner .banner-text {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1.4rem, 5vw, 2rem);
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,64,0.4);
}
.czar-banner-inner .banner-sub {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: 1px;
}

@keyframes czarBannerIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
@keyframes czarBannerOut {
  0% { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes crownBounce {
  0% { transform: scale(0) rotate(-20deg); }
  50% { transform: scale(1.3) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes czarCardPop {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ── CONNECTION STATUS ── */
.conn-status {
  position: fixed; bottom: 12px; left: 12px;
  font-size: 0.7rem;
  color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
  z-index: 50;
}
.conn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
}
.conn-dot.disconnected { background: #f44; }

/* ── SERVER BROWSER ── */
#serverBrowser { gap: 16px; max-width: 600px; margin: 0 auto; padding-top: 30px; }
.server-list-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}
.server-list {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 45vh;
  overflow-y: auto;
}
.server-list::-webkit-scrollbar { width: 4px; }
.server-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.server-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.server-item:hover { border-color: var(--accent); background: var(--surface2); }
.server-item .server-info { flex: 1; min-width: 0; }
.server-item .server-name {
  font-family: 'Oswald', sans-serif;
  font-size: 1.05rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.server-item .server-meta {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 2px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.server-item .server-lock { color: var(--gold); font-size: 1rem; flex-shrink: 0; }
.server-item .server-phase {
